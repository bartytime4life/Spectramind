[tool.poetry]
name = "spectramind-v50"
version = "0.1.0"
description = "SpectraMind V50: Scientific AI pipeline for NeurIPS 2025 Ariel Data Challenge"
authors = ["Andy Barta <andy@example.com>"]
license = "MIT"
readme = "README.md"
packages = [{ include = "spectramind", from = "src" }]

[tool.poetry.dependencies]
python = ">=3.10,<3.12"

# Core ML & Science
torch = { version = "^2.1", source = "pytorch" }
numpy = "*"
pandas = "*"
scipy = "*"
matplotlib = "*"

# CLI & Configuration
typer = "^0.9"
hydra-core = "^1.3"
omegaconf = "^2.3"

# MLOps & Experiment Tracking
mlflow = "^2.4"
optuna = "^3.5"

# Graph-based Modeling
torch-geometric = "^2.4"
torch-scatter = "^2.1"
torch-sparse = "^0.6"

# Hugging Face Ecosystem
transformers = "^4.39"
datasets = "^2.18"
accelerate = "^0.27"

# Data Versioning
dvc = "^3.0"
lakefs = "^0.97.0"

# Utility
tqdm = "*"
pyyaml = "*"
python-dotenv = "*"

# Optional (if needed)
mamba-ssm = { git = "https://github.com/state-spaces/mamba.git", rev = "main" }

[tool.poetry.group.dev.dependencies]
black = "^24.3.0"
isort = "^5.12.0"
pytest = "^7.3.0"
pre-commit = "^3.5.0"

[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"

[[tool.poetry.source]]
name = "pytorch"
url = "https://download.pytorch.org/whl/cu121"
priority = "explicit"