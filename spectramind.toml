# spectramind.toml
# Unified Configuration and Provenance Record for SpectraMind V50
# All fields are strictly version-locked and traceable across runs

[project]
name = "SpectraMind V50"
description = "Scientific AI pipeline for exoplanet atmosphere spectrum recovery under the ESA + NeurIPS 2025 Ariel Data Challenge"
version = "0.1.0"
license = "MIT"
authors = ["Andy Barta <andy@example.com>"]
repository = "https://github.com/your-org/spectramind-v50"
documentation = "README.md"
readme = "README.md"

[environment]
python = "3.10.x"
cuda = "12.1"
pytorch = "2.1.0+cu121"
device = "cuda"
system = "Ubuntu 24.04 LTS"
dvc = true
lakefs = true
mlflow = true

[training]
model = "model_v50_ar"
encoder_fgs = "Mamba SSM"
encoder_airs = "Spectral GNN"
decoder = "Multi-Scale μ + Flow-Based σ"
losses = ["GLL", "SymbolicLoss", "CalibrationPenalty"]
batch_size = 4
epochs = 50
optimizer = "AdamW"
learning_rate = 5e-4
scheduler = "CosineDecay"

[inference]
submission_format = "567-column CSV"
output_file = "submission.csv"
validator_script = "scripts/submission_validator_v50.py"
packager_script = "scripts/generate_submission_package.py"

[symbolic]
enabled = true
logic_engine = "symbolic_logic_engine.py"
modules = [
  "symbolic_loss.py",
  "photonic_alignment.py",
  "symbolic_profile_switcher.py",
  "symbolic_violation_predictor.py",
  "auto_symbolic_rule_miner.py",
  "neural_logic_graph.py",
  "symbolic_program_ensemble.py"
]
template_basis = "configs/photonic_basis.yaml"
fft_templates = "configs/fft_templates.yaml"
constraint_weight_smoothness = 1.0
constraint_weight_alignment = 1.0
constraint_weight_nonneg = 0.5

[diagnostics]
enabled = true
modules = [
  "fft_variance_heatmap.py",
  "coherence_curve_plot.py",
  "violation_heatmap.py",
  "entropy_heatmap.py",
  "latent_drift_overlay.py",
  "anomaly_feedback_trainer.py",
  "generate_diagnostic_summary.py"
]
shap = true
attention_overlay = true
html_report = true
outputs_dir = "outputs/diagnostics/"

[simulators]
enabled = true
instrument = "instrument_simulator.py"
transfer_graph = "spectral_transfer_graph.py"
temporal_simulator = "temporal_transit_simulator.py"

[adaptation]
planet_memory_bank = "planet_memory_bank.py"
hypercluster_adaptor = "hypercluster_adaptor.py"
episode_summarizer = "planet_episode_summarizer.py"

[cli]
entry = "src/spectramind/cli/cli_v50.py"
selftest = "src/spectramind/cli/selftest.py"
dashboard = "src/spectramind/cli/cli_dashboard_mini.py"
explain_util = "src/spectramind/cli/cli_explain_util.py"
error_humanizer = "src/spectramind/cli/error_humanizer.py"

[hashes]
manifest_file = "manifest_v50.csv"
run_hash_file = "run_hash_summary_v50.json"
constraint_log = "constraint_violation_log.json"

[submission]
run_limit_hours = 9
format_compliance = true
validated = true
score_script = "src/spectramind/evaluation/validate.py"
score_metric = "Gaussian Log-Likelihood (GLL)"

[reproducibility]
hydra_configs = true
config_yaml = "configs/config.yaml"
run_profile = "configs/run/experiment.yaml"
full_lock = true
git_hash = "<to-be-filled-by-finalizer>"
timestamp = "<to-be-filled-by-finalizer>"