[version]
name = "SpectraMind V50"
release = "v50.0.0"
status = "stable"
created_at = "2025-07-28T00:00:00Z"

[system]
framework = "PyTorch"
cuda_version = "12.1"
python_version = "3.10"
platform = "Ubuntu 24.04 LTS"
entrypoint = "cli_v50.py"

[dependencies]
torch = ">=2.1"
torch-geometric = ">=2.4"
hydra-core = ">=1.3"
typer = ">=0.9"
mlflow = ">=2.4"
optuna = ">=3.5"
transformers = ">=4.39"
datasets = ">=2.18"
accelerate = "*"
dvc = "*"
lakefs = "*"
mamba-ssm = "git"

[modules.core]
encoder = ["FGS1MambaEncoder", "AIRSGNNEncoder"]
decoder = ["MultiScaleDecoder"]
uncertainty = ["FlowUncertaintyHead"]

[modules.training]
trainer = "train_v50.py"
loss = "gaussian_log_likelihood"
optimizer = "Adam"
batch_size = 16
epochs = 20
device = "cuda"

[modules.inference]
inference = "predict_v50.py"
submission = "submission.py"
validator = "validate.py"
calibrator = "calibrate.py"

[modules.cli]
entry = "cli_v50.py"
commands = ["train_cmd", "predict_cmd", "validate_cmd", "calibrate_cmd"]
selftest = "selftest.py"

[modules.packaging]
bundle = "generate_submission_package.py"
manifest = "manifest_v50.csv"
hash_summary = "run_hash_summary_v50.json"
constraint_log = "constraint_violation_log.json"

[constraints]
photonic_templates = "photonic_basis.yaml"
science_rules = "science_constraints_v50.yaml"
fft_templates = "fft_templates.yaml"

[files]
config = "configs/config.yaml"
readme = "README.md"
license = "MIT"

[submission]
format = "planet_id, mu_1..283, sigma_1..283"
columns = 567
path = "outputs/submission.csv"